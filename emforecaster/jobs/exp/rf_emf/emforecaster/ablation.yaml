job_name: "rf_emf/emforecaster"

ablations:
  exp.project_name: ["rf-emf-conf/main"]
  data.dataset: ["rf_emf"]
  exp.patch_model_id: ["TSMixer"]
  data.num_channels: [1]
  tsmixer.dropout: [0.3]
  data.seq_len: [336]
  data.pred_len: [192, 336, 512]
  sl.scheduler: ["onecycle"]
  sl.lr: [0.0001]
  sl.patch_norm: ["none"]
  sl.patch_act: ["gelu"]
  exp.backbone_id: ["Linear"]
  tsmixer.num_enc_layers: [1, 2]
  tsmixer.d_model: [128, 256, 512]
  data.patch_dim: [8]
  data.patch_stride: [-1]
  sl.patch_embed_dim: [256]
  sl.pos_enc: ["none"]
  dlinear.final_moving_avg: [25]
  sl.independent_patching: [False]
  sl.batch_size: [512]
  exp.gpu_id: [0]

  # Conformal prediction
  conf.conf: [True]
  conf.alpha: [0.05, 0.01]
  conf.corrected: [True]
