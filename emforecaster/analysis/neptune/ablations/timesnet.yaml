neptune:
  project: "xmootoo/rf-emf-forecasting"

filters:
  "parameters/exp/model_id": "TimesNet"
  "parameters/data/dataset": "rf_emf"
  "parameters/data/seq_len": 336
  "parameters/data/pred_len": 512

metrics:
  - "sl_test/loss"
  - "sl_test/mae"

deciding_metric: "sl_test/loss"
ranking: "min"
delete_duplicates: False
duplicate_ranking: "min"

ablations:
  seeds: [69421, 69422, 69423, 69424, 69425]
  params:
    - "parameters/data/seq_len"
    - "parameters/data/pred_len"
    - "parameters/sl/num_enc_layers"
    - "parameters/timesnet/d_model"
    - "parameters/timesnet/d_ff"
    - "parameters/timesnet/num_kernels"
    - "parameters/timesnet/top_k"
    - "parameters/sl/lr"
